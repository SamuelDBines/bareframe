name: Deploy Examples To Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Package
        run: npm run build

      - name: Prepare Examples Artifact
        run: |
          rm -rf examples/src examples/themes examples/dist
          cp -R themes examples/themes
          cp -R dist examples/dist
          find examples -name '*.html' -type f -exec sed -i.bak "s#\\./src/index.js#\\./dist/bareframe.min.js#g" {} \;
          find examples -name '*.bak' -type f -delete

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples

      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bareframe avatar test</title>
    <link id="themeStylesheet" rel="stylesheet" href="../themes/system.css" />
    <style>
      body {
        font-family: 'Avenir Next', 'Segoe UI', sans-serif;
        margin: 2rem;
        line-height: 1.45;
        color: var(--bf-theme-text-1, #111827);
        background: var(--bf-theme-surface-2, #f8fafc);
      }

      .layout {
        display: grid;
        gap: 1rem;
        max-width: 980px;
      }

      .panel {
        border: 1px solid var(--bf-theme-border-1, #d1d5db);
        border-radius: 12px;
        background: var(--bf-theme-surface-1, #ffffff);
        padding: 1rem;
      }

      .theme-controls,
      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.85rem;
      }

      .stack { display: grid; gap: 0.7rem; }
      .hint { margin: 0; color: var(--bf-theme-text-2, #4b5563); }
      code { background: rgba(148, 163, 184, 0.2); padding: 0.1rem 0.35rem; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="layout">
      <header>
        <h1>bf-avatar</h1>
        <p>User profile image, initials fallback, and status.</p>
      </header>

      <section class="panel">
        <div class="theme-controls">
          <label for="themeSelect">Theme</label>
          <select id="themeSelect">
            <option value="system">system</option>
            <option value="light">light</option>
            <option value="dark">dark</option>
            <option value="sprint">sprint</option>
          </select>
          <span id="themeStatus"></span>
        </div>
      </section>

      <section class="panel stack">
        <h2>Primary Demo</h2>
        <div class="row">
          <bf-avatar name="Samuel Bines" size="sm" status="online"></bf-avatar>
          <bf-avatar name="Morgan Lee" size="md" status="away"></bf-avatar>
          <bf-avatar name="Iris Chen" size="lg" status="busy"></bf-avatar>
          <bf-avatar name="Taylor Jordan" size="xl" status="offline"></bf-avatar>
        </div>
        <p class="hint">No <code>src</code> provided: the component generates initials fallback.</p>
      </section>

      <section class="panel stack">
        <h2>Image + Fallback</h2>
        <div class="row">
          <bf-avatar
            name="Camila Vale"
            src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&q=80&auto=format&fit=crop"
            status="online"
          ></bf-avatar>
          <bf-avatar
            name="Invalid Image"
            src="https://example.invalid/avatar.jpg"
            status="offline"
          ></bf-avatar>
        </div>
        <p class="hint">Second avatar intentionally fails image load and falls back to initials.</p>
      </section>
    </div>

    <script type="module" src="../src/index.js"></script>
    <script type="module">
      const themeSelect = document.getElementById('themeSelect');
      const themeStatus = document.getElementById('themeStatus');
      const themeStylesheet = document.getElementById('themeStylesheet');

      function applyTheme(theme) {
        themeStylesheet.href = '../themes/' + theme + '.css';
        document.documentElement.setAttribute('data-bf-theme', theme);
        themeStatus.textContent = 'Active: ' + theme;
      }

      themeSelect.addEventListener('change', () => applyTheme(themeSelect.value));
      applyTheme('system');
    </script>
  </body>
</html>

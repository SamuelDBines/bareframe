<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bareframe autocomplete test</title>
    <link id="themeStylesheet" rel="stylesheet" href="../themes/system.css" />
    <style>
      body {
        font-family: 'Avenir Next', 'Segoe UI', sans-serif;
        margin: 2rem;
        line-height: 1.45;
        color: var(--bf-theme-text-1, #111827);
        background: var(--bf-theme-surface-2, #f8fafc);
      }

      .layout {
        display: grid;
        gap: 1rem;
        max-width: 980px;
      }

      .panel {
        border: 1px solid var(--bf-theme-border-1, #d1d5db);
        border-radius: 12px;
        background: var(--bf-theme-surface-1, #ffffff);
        padding: 1rem;
      }

      .theme-controls,
      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.7rem;
      }

      .stack { display: grid; gap: 0.6rem; }
      .hint { margin: 0; color: var(--bf-theme-text-2, #4b5563); }
      .log {
        margin: 0;
        padding: 0.75rem;
        border: 1px solid var(--bf-theme-border-1, #d1d5db);
        border-radius: 8px;
        background: var(--bf-theme-surface-2, #f3f4f6);
        min-height: 48px;
        white-space: pre-wrap;
      }
      code { background: rgba(148, 163, 184, 0.2); padding: 0.1rem 0.35rem; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="layout">
      <header>
        <h1>bf-autocomplete</h1>
        <p>Text input with dynamic suggestions.</p>
      </header>

      <section class="panel">
        <div class="theme-controls">
          <label for="themeSelect">Theme</label>
          <select id="themeSelect">
            <option value="system">system</option>
            <option value="light">light</option>
            <option value="dark">dark</option>
            <option value="sprint">sprint</option>
          </select>
          <span id="themeStatus"></span>
        </div>
      </section>

      <section class="panel stack">
        <h2>Primary Demo</h2>
        <bf-autocomplete
          id="componentSearch"
          placeholder="Search components..."
          options='["Accordion","Alert","Autocomplete","Button","Card","Data Grid","Dialog","Dropdown","Modal","Table","Tabs","Toast","Tooltip","Typography"]'
        ></bf-autocomplete>
        <p class="hint">Try typing: <code>to</code>, <code>tab</code>, <code>auto</code>. Use arrow keys + Enter to select.</p>
      </section>

      <section class="panel stack">
        <h2>Events</h2>
        <p class="hint"><code>bf-change</code> fires while typing. <code>bf-select</code> fires when an option is selected.</p>
        <pre id="log" class="log">No events yet.</pre>
      </section>
    </div>

    <script type="module" src="../src/index.js"></script>
    <script type="module">
      const themeSelect = document.getElementById('themeSelect');
      const themeStatus = document.getElementById('themeStatus');
      const themeStylesheet = document.getElementById('themeStylesheet');
      const log = document.getElementById('log');
      const componentSearch = document.getElementById('componentSearch');

      function applyTheme(theme) {
        themeStylesheet.href = '../themes/' + theme + '.css';
        document.documentElement.setAttribute('data-bf-theme', theme);
        themeStatus.textContent = 'Active: ' + theme;
      }

      function writeLog(type, detail) {
        log.textContent = `${type}: ${JSON.stringify(detail, null, 2)}`;
      }

      componentSearch.addEventListener('bf-change', (event) => {
        writeLog('bf-change', event.detail);
      });

      componentSearch.addEventListener('bf-select', (event) => {
        writeLog('bf-select', event.detail);
      });

      themeSelect.addEventListener('change', () => applyTheme(themeSelect.value));
      applyTheme('system');
    </script>
  </body>
</html>
